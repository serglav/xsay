# =============================================================================
# xsay v3 SPEC
# =============================================================================
# Project-aware macOS TTS with voice-name profiles, volume/pitch controls,
# comma-separated flag aliases, and async FIFO queue.
#
# Created: 2026-02-13 (v1)
# Updated: 2026-03-02 (v3)
# =============================================================================

name: xsay
version: "3.1"
category: tts
status: active

description: |
  Project-aware macOS TTS CLI with voice-name profiles, real volume/pitch
  audio controls, inline sound effects, comma-separated flag aliases, and
  async FIFO consumer. Auto-creates .xsay config at project root from
  master config.

# =============================================================================
# FILES
# =============================================================================

files:
  source: /Users/Dev/claude-work/_xsay/xsay.sh
  binary: /Users/serglavren/bin/xsay
  master_config: /Users/Dev/claude-work/_xsay/xsay.conf
  project_config: "{project_root}/.xsay"
  spec: /Users/Dev/claude-work/_xsay/xsay_SPEC.yaml
  changelog: /Users/Dev/claude-work/_xsay/xsay_CHANGELOG.md
  fifo: /tmp/xsay.fifo
  pid: /tmp/xsay.pid
  last_repo: /tmp/xsay.last_repo
  logs: "{project_root}/loom/xsay/xlog_MMM_dd_YYYY.yaml"
  soundfx_dir: /Users/Dev/claude-work/_xsay/soundfx/

# =============================================================================
# PROFILES
# =============================================================================

profiles:
  default:
    voice: Zoe (Premium)
    rate: 180
    volume: 1.0
    pitch: 45

  ava:
    voice: Ava (Premium)
    rate: 175
    volume: 1.0
    pitch: 45
    flags: [ava, narrate, student]
    legacy_from: "[narrator] + [student]"

  lee:
    voice: Lee (Premium)
    rate: 200
    volume: 1.0
    pitch: 45
    flags: [lee, announce]
    legacy_from: "[announcer]"

  evan:
    voice: Evan (Enhanced)
    rate: 175
    volume: 1.0
    pitch: 45
    flags: [evan, instructor]
    legacy_from: "[instructor]"

  nathan:
    voice: Nathan (Enhanced)
    rate: 190
    volume: 0.9
    pitch: 45
    flags: [nathan, repo]
    legacy_from: "[repo]"
    special_keys: [stale_minutes, enabled, template]

  allison:
    voice: Allison (Enhanced)
    rate: 180
    volume: 1.0
    pitch: 45
    flags: [allison]

  nicky:
    voice: Nicky (Enhanced)
    rate: 190
    volume: 1.0
    pitch: 45
    flags: [nicky]

  samantha:
    voice: Samantha (Enhanced)
    rate: 185
    volume: 1.0
    pitch: 45
    flags: [samantha]

  tom:
    voice: Tom (Enhanced)
    rate: 185
    volume: 1.0
    pitch: 45
    flags: [tom]

# =============================================================================
# PROTOCOL
# =============================================================================

fifo_protocol:
  version: 2
  format: "voice|rate|volume|pitch|message [[slnc 500]]"
  fields: 5
  backward_compat: "3-field v2 lines auto-detected (default vol=1.0, pitch=45)"
  audio_controls:
    volume: "[[volm V]] — range 0.0-1.0"
    pitch: "[[pbas P]] — range 0-127, default 45"

# =============================================================================
# USAGE
# =============================================================================

usage:
  basic: 'xsay "message"'
  profile_flag: 'xsay ava: message'
  profile_explicit: 'xsay -v evan message'
  pause: 'xsay "Hello {10} world"  # 1s pause (tenths)'
  soundfx: 'xsay "{ping} task done"  # plays ping.aiff then speaks'
  sounds_list: 'xsay --sounds'
  sounds_preview: 'xsay --sounds ping'
  list: 'xsay -l'
  update: 'xsay --update'
  help: 'xsay --help'
  context: 'xsay --context'
  config: 'xsay --config'

# =============================================================================
# SOUND EFFECTS
# =============================================================================

soundfx:
  directory: /Users/Dev/claude-work/_xsay/soundfx/
  source: "/System/Library/Sounds/*.aiff (copied, lowercase)"
  format: ".aiff (macOS native)"

  token_syntax: "{name} in message text"
  expansion: "{name} → [[sfx:name]] when soundfx/{name}.aiff exists"
  passthrough: "{name} left literal when no matching .aiff"

  available:
    - basso
    - blow
    - bottle
    - frog
    - funk
    - glass
    - hero
    - morse
    - ping
    - pop
    - purr
    - sosumi
    - submarine
    - tink

  consumer_behavior: |
    When [[sfx:name]] markers are present in a FIFO message, the consumer
    splits the message at marker boundaries and alternates say (text) and
    afplay (audio) calls sequentially. Empty text segments are skipped.
    afplay -v uses the profile's volume= setting for consistent loudness.

  cli_flag: "--sounds [name] — list all effects or preview one"

# =============================================================================
# DEPLOYMENT
# =============================================================================

deployment:
  procedure:
    - "1. Edit _xsay/xsay.sh (development source)"
    - "2. Test changes"
    - "3. cp _xsay/xsay.sh ~/bin/xsay && chmod +x ~/bin/xsay"
    - "4. Kill old consumer: kill $(cat /tmp/xsay.pid) if running"
    - "5. Run xsay --update in projects to sync built-in profiles"
