# xsay v3.5.1 master config — edit here, then delete project .xsay to regenerate
# Voices: Evan (Enhanced) | Nathan (Enhanced) | Zoe (Premium) | Tom (Enhanced)
# Keys: voice, rate (wpm), volume (0.0-1.0), pitch (0-127), flag (comma-separated triggers)
# voice=  (empty = use macOS system voice; uncomment and set to override)
rate=180
volume=1.0
pitch=45
logging_enabled=true
log_subdir=loom/xsay

# ─── Voice profiles ─── usage: xsay evan: hello world

[evan]
voice=Evan (Enhanced)
rate=175
volume=1.0
pitch=45
flag=evan

[nathan]
voice=Nathan (Enhanced)
rate=190
volume=0.9
pitch=45
flag=nathan,repo
stale_minutes=5
enabled=true
template=REPO {2} {repo} {5}
# Template placeholders: {repo}, {branch}, {commit}, {time}
# Pause tokens: {2}=200ms, {5}=500ms, {10}=1s
# Examples:
#   template=REPO {2} {repo} {5}
#   template=Repository {2} {repo} on {branch} {5}
#   template=Repository {2} {repo} on {branch}. Last commit: {commit}, {time}. {5}

[zoe]
voice=Zoe (Premium)
rate=180
volume=1.0
pitch=45
flag=zoe,narrate

[tom]
voice=Tom (Enhanced)
rate=185
volume=1.0
pitch=45
flag=tom
