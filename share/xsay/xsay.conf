# xsay v3 master config — edit here, then delete project .xsay to regenerate
# Voices: Ava (Premium) | Allison (Enhanced) | Evan (Enhanced) | Lee (Premium)
#         Nathan (Enhanced) | Nicky (Enhanced) | Samantha (Enhanced) | Tom (Enhanced) | Zoe (Premium)
# Keys: voice, rate (wpm), volume (0.0-1.0), pitch (0-127), flag (comma-separated triggers)
voice=Evan (Enhanced)
rate=180
volume=1.0
pitch=45
logging_enabled=true
log_subdir=loom/xsay

# ─── Voice profiles ─── usage: xsay ava: hello world

[ava]
voice=Ava (Premium)
rate=175
volume=1.0
pitch=45
flag=ava,narrate,student

[lee]
voice=Lee (Premium)
rate=200
volume=1.0
pitch=45
flag=lee,announce

[evan]
voice=Nathan (Enhanced)
rate=190
volume=0.9
pitch=45
flag=evan,instructor

[nathan]
voice=Evan (Enhanced)
rate=175
volume=1.0
pitch=45
flag=nathan,repo
stale_minutes=5
enabled=true
template=REPO {2} {repo} {5}
# Template placeholders: {repo}, {branch}, {commit}, {time}
# Pause tokens: {2}=200ms, {5}=500ms, {10}=1s
# Examples:
#   template=REPO {2} {repo} {5}
#   template=Repository {2} {repo} on {branch} {5}
#   template=Repository {2} {repo} on {branch}. Last commit: {commit}, {time}. {5}

[allison]
voice=Allison (Enhanced)
rate=180
volume=1.0
pitch=45
flag=allison

[nicky]
voice=Nicky (Enhanced)
rate=190
volume=1.0
pitch=45
flag=nicky

[samantha]
voice=Samantha (Enhanced)
rate=185
volume=1.0
pitch=45
flag=samantha

[tom]
voice=Tom (Enhanced)
rate=185
volume=1.0
pitch=45
flag=tom
